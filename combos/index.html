<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Security Headers -->
    <meta name="referrer" content="strict-origin-when-cross-origin">

    <title>Combos y Regalos | MisajoCookies Cali</title>
    <meta name="description"
        content="Sorprende con nuestros combos de galletas artesanales. Regalos perfectos para toda ocasión en Cali.">

    <link rel="canonical" href="https://www.misajocookies.com/combos/" />


    <style>
        :root {
            --color-primary: #3D2B1F;
            --color-accent: #E35336;
            --color-cream: #F5F5DC;
            --font-display: 'Corben', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        body {
            font-family: var(--font-body);
            background-color: var(--color-cream);
            margin: 0;
        }

        header {
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 1000;
        }

        main {
            margin-top: 100px;
            padding: 2rem;
        }

        .page-header {
            text-align: center;
            margin-bottom: 3rem;
        }

        .page-title {
            font-family: var(--font-display);
            font-size: 3rem;
            color: var(--color-primary);
        }
    </style>

    <link rel="stylesheet" href="../assets/css/styles.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="../assets/css/slider.css" media="print" onload="this.media='all'">
    <noscript>
        <link rel="stylesheet" href="../assets/css/styles.css">
        <link rel="stylesheet" href="../assets/css/slider.css">
    </noscript>
    <style>
        /* Reserva altura para sliders (evita CLS) */
        .combo-card .slider-container { height: 300px; overflow: hidden; }
    </style>

    <!-- Favicon -->
    <link rel="icon" href="../assets/images/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="../assets/images/favicon/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <!-- Catálogo centralizado -->
    <script src="../assets/js/catalog-data.js"></script>
    <script src="../assets/js/catalog-render.js" defer></script>
    <script src="../assets/js/components/misajo-header.js" defer></script>
    <script src="../assets/js/components/misajo-footer.js" defer></script>
</head>

<body>
    <misajo-header></misajo-header>

    <main>
        <div class="page-header">
            <h1 class="page-title">Combos de Galletas Artesanales y Regalos – MisajoCookies Cali</h1>
            <p>La forma más dulce de decir "Te Quiero"</p>
        </div>

        <div class="products-grid"
             data-catalog="combos"
             data-action="order"
             data-heading="h2"></div>
    </main>

    <misajo-footer></misajo-footer>
    <script src="../assets/js/main.js" defer></script>
</body>

</html>
