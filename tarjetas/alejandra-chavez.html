<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="referrer" content="strict-origin-when-cross-origin">
    <title>Alejandra Chavez | Presidenta · MisajoCookies</title>
    <meta name="description" content="Alejandra Chavez Caicedo — Presidenta, MisajoCookies Cali">
    <meta name="theme-color" content="#3D2B1F">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Corben:wght@400;700&family=Montserrat:wght@300;400;500;600&display=swap"
        rel="stylesheet">
    <!-- Favicon -->
    <link rel="icon" href="../assets/images/favicon/favicon.ico" sizes="any">
    <link rel="icon" href="../assets/images/favicon/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="../assets/images/favicon/apple-touch-icon.png">
    <link rel="manifest" href="../assets/images/favicon/site.webmanifest">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <link rel="stylesheet" href="../assets/css/tarjetas/alejandra-chavez.css">
</head>

<body>
    <div class="card">
        <div class="card-header">
            <div class="logo-wrap" style="display:flex; align-items:center; justify-content:center; gap:0.5rem;">
                <img src="../assets/images/favicon/favicon-96x96.png" alt="" style="height:40px; width:auto; border-radius:6px; flex-shrink:0;" onerror="this.style.display='none'">
                <img src="../assets/images/logo.webp" alt="MisajoCookies"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='block'">
                <div class="logo-fallback" style="display:none">Misajo<span>Cookies</span></div>
            </div>
            <div class="avatar"><img src="../assets/images/mascota.webp" alt="MisajoCookies Mascota"></div>
            <h1 class="card-name">Alejandra Chavez<br>Caicedo</h1>
            <span class="card-role">Presidenta</span>
        </div>
        <div class="card-body">
            <ul class="contact-list">
                <li class="contact-item">
                    <a href="tel:+573187911602">
                        <div class="icon-wrap"><i class="fas fa-phone"></i></div>
                        <div>
                            <div class="contact-label">Teléfono</div>
                            <div class="contact-value">+57 318 791 1602</div>
                        </div>
                    </a>
                </li>
                <li class="contact-item">
                    <a href="https://www.linkedin.com/in/alejandra-chavez-ingeniera" target="_blank"
                        rel="noopener noreferrer">
                        <div class="icon-wrap"><i class="fab fa-linkedin-in"></i></div>
                        <div>
                            <div class="contact-label">LinkedIn</div>
                            <div class="contact-value">alejandra-chavez-ingeniera</div>
                        </div>
                    </a>
                </li>
                <li class="contact-item">
                    <a href="https://www.misajocookies.com/" target="_blank" rel="noopener noreferrer">
                        <div class="icon-wrap"><i class="fas fa-globe"></i></div>
                        <div>
                            <div class="contact-label">Tienda en Línea/div>
                            <div class="contact-value">misajocookies.com</div>
                        </div>
                    </a>
                </li>
            </ul>
            <div class="btn-row three">
                <a href="https://wa.me/573187911602" target="_blank" rel="noopener noreferrer"
                    class="act-btn btn-whatsapp"><i class="fab fa-whatsapp"></i> Chat</a>
                <button class="act-btn btn-qr" onclick="openQR()"><i class="fas fa-qrcode"></i> QR</button>
                <button class="act-btn btn-nfc hidden" id="nfc-btn" onclick="shareNFC()"><i class="fas fa-tower-broadcast"></i> NFC</button>
                <button class="act-btn btn-save" onclick="saveContact()"><i class="fas fa-floppy-disk"></i> Guardar</button>
                <a href="https://www.misajocookies.com/" target="_blank" rel="noopener noreferrer"
                    class="act-btn btn-web"><i class="fas fa-store"></i> Tienda</a>
            </div>
        </div>
        <div class="card-footer">MisajoCookies © 2026 · Cali, Valle del Cauca, Colombia</div>
    </div>
    <div class="qr-modal" id="qr-modal" onclick="closeQROutside(event)">
        <div class="qr-box">
            <h3>Escanea para ver mi tarjeta</h3>
            <div id="qr-canvas"></div>
            <div class="qr-url" id="qr-url-text"></div>
            <button class="qr-close" onclick="closeQR()">Cerrar</button>
        </div>
    </div>
    <div class="toast" id="toast"></div>
    <script>
        const CARD_URL = window.location.href.split('?')[0];
        let qrGenerated = false;
        function openQR() {
            document.getElementById('qr-modal').classList.add('open');
            document.getElementById('qr-url-text').textContent = CARD_URL;
            if (!qrGenerated) {
                const img = document.createElement('img');
                img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=' + encodeURIComponent(CARD_URL) + '&color=3D2B1F&bgcolor=FFFFFF&ecc=H';
                img.alt = 'Código QR';
                img.width = 200;
                img.height = 200;
                document.getElementById('qr-canvas').appendChild(img);
                qrGenerated = true;
            }
        }
        function closeQR() { document.getElementById('qr-modal').classList.remove('open'); }
        function closeQROutside(e) { if (e.target === document.getElementById('qr-modal')) closeQR(); }
        function showToast(msg, d = 3000) { const t = document.getElementById('toast'); t.textContent = msg; t.classList.add('show'); setTimeout(() => t.classList.remove('show'), d); }
        async function shareNFC() {
            if (!('NDEFReader' in window)) { showToast('❌ NFC no disponible en este navegador'); return; }
            try {
                showToast('📡 Acerca otro dispositivo NFC…', 5000);
                const w = new NDEFReader();
                await w.write({ records: [{ recordType: 'url', data: CARD_URL }] });
                showToast('✅ ¡Compartido por NFC!');
            } catch (e) { showToast('⚠️ ' + (e.message || 'Error NFC')); }
        }
        if ('NDEFReader' in window) {
            document.getElementById('nfc-btn').classList.remove('hidden');
            document.querySelector('.btn-row').style.gridTemplateColumns = 'repeat(2, 1fr)';
        }

        // ---- Guardar Contacto (vCard) ----
        function saveContact() {
            const vcard = [
                'BEGIN:VCARD',
                'VERSION:3.0',
                'FN:Alejandra Chavez Caicedo',
                'N:Chavez Caicedo;Alejandra;;;',
                'ORG:MisajoCookies',
                'TITLE:Presidenta',
                'TEL;TYPE=CELL:+573187911602',
                'URL:https://www.misajocookies.com/',
                'URL:https://www.linkedin.com/in/alejandra-chavez-ingeniera',
                'END:VCARD'
            ].join('\r\n');
            const blob = new Blob([vcard], { type: 'text/vcard;charset=utf-8' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'alejandra-chavez.vcf';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
            showToast('💾 Contacto descargado — ábrelo para guardar');
        }
    </script>
</body>

</html>
